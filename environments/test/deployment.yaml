apiVersion: apps/v1
kind: Deployment
metadata:
  name: challenge-app
  namespace: challenge-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: challenge-app
  template:
    metadata:
      labels:
        app: challenge-app
    spec:
      containers:
        - name: challenge-app
          image: ghcr.io/minaahmadian/challenge-app:6c4dd858f5aaa0a5eb810665ae3a7cbb108ad40
          ports:
            - containerPort: 80
